# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test broker deployment
templates:
  - emqx.yaml
set:
  forge.domain: "chart-unit-tests.com"
  forge.broker.enabled: true
capabilities:
  apiVersions:
    - apps.emqx.io/v2beta1
tests:
  - it: should create an EMQX custom resource
    documentIndex: 0
    asserts:
      - isKind:
          of: EMQX
      - equal:
          path: spec.image
          value: emqx:5

  - it: should deploy EMQX even when the team broker is disabled
    documentIndex: 0
    set:
      forge.broker.teamBroker.enabled: false
    asserts:
      - isKind:
          of: EMQX

  - it: should deploy EMQX when the team broker is enabled
    documentIndex: 0
    set:
      forge.broker.teamBroker.enabled: true
    asserts:
      - isKind:
          of: EMQX

  - it: should use forge.revisionHistoryLimit as default for the EMQX broker
    documentIndex: 0
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 10

  - it: should prefer broker.revisionHistoryLimit over forge.revisionHistoryLimit
    documentIndex: 0
    set:
      forge.revisionHistoryLimit: 7
      broker.revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: should default the EMQX core replicas to 2
    documentIndex: 0
    asserts:
      - equal:
          path: spec.coreTemplate.spec.replicas
          value: 2

  - it: should honor a custom broker.replicas value
    documentIndex: 0
    set:
      broker.replicas: 3
    asserts:
      - equal:
          path: spec.coreTemplate.spec.replicas
          value: 3

  - it: should fall back to 2 replicas when broker.replicas is null
    documentIndex: 0
    set:
      broker.replicas: null
    asserts:
      - equal:
          path: spec.coreTemplate.spec.replicas
          value: 2

  - it: should generate the emqx-config-secrets secret when no existingSecret is set
    documentSelector:
      path: metadata.name
      value: emqx-config-secrets
    asserts:
      - isKind:
          of: Secret
      - exists:
          path: data.api_key_secret

  - it: should not generate the emqx-config-secrets secret when existingSecret is set
    set:
      broker.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: EMQX
        documentIndex: 0
      - isKind:
          of: Ingress
        documentIndex: 1
      - isKind:
          of: Service
        documentIndex: 2

  - it: should create the broker ingress pointing at the EMQX listeners service
    documentIndex: 2
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: flowforge-broker
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: emqx-listeners
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: should create the flowforge-broker compatibility service selecting EMQX pods
    documentIndex: 3
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: flowforge-broker
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[?(@.name == "mqtt-native")].port
          value: 1883
      - equal:
          path: spec.selector
          value:
            apps.emqx.io/db-role: core
            apps.emqx.io/instance: emqx
            apps.emqx.io/managed-by: emqx-operator

  - it: should create a NodePort-type flowforge-broker service with custom node ports
    documentIndex: 3
    set:
      broker.service:
        type: NodePort
        mqtt:
          nodePort: 30001
        ws:
          nodePort: 30002
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[?(@.name == "mqtt-native")].nodePort
          value: 30001
      - equal:
          path: spec.ports[?(@.name == "mqtt-ws")].nodePort
          value: 30002
