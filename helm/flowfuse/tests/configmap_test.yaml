# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test configmap
templates:
  - configmap.yaml
set:
  forge.domain: "chart-unit-tests.com"
tests:
  - it: should render core server settings (host, port, domain)
    set:
      forge.domain: example.com
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "host: 0\\.0\\.0\\.0"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "port: 3000"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "domain: example\\.com"

  - it: should configure the postgres database
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "db:\\n\\s+type: postgres"

  - it: should configure the kubernetes driver
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "driver:\\n\\s+type: kubernetes"

  - it: should render default logging configuration
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "logging:\\n\\s+level: info\\n\\s+http: info"

  - it: should render the email block when email is configured
    set:
      forge.email:
        from: '"FlowForge" <flowforge@example.com>'
        ses:
          region: eu-west-1
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "email:\\n\\s+enabled: true"

  - it: should default the email block to disabled when email is not configured
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "email:\\n\\s+enabled: false"

  - it: should render broker url and public_url when broker is enabled
    set:
      forge.broker:
        enabled: true
        url: mqtt://flowforge-broker.default:1883
        public_url: wss://mqtt.example.com
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "broker:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "url: mqtt://flowforge-broker\\.default:1883"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "public_url: wss://mqtt\\.example\\.com"

  - it: should render the fileStore url when fileStore is enabled
    release:
      namespace: default
    set:
      forge.fileStore.enabled: true
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "fileStore:\\n\\s+url: http://flowforge-file\\.default"

  - it: should render sentry telemetry for frontend and backend
    set:
      forge.telemetry.sentry:
        production_mode: false
        frontend_dsn: https://sentry.io/flowforge/flowforge-frontend
        backend_dsn: https://sentry.io/flowforge/flowforge-backend
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "dsn: https://sentry\\.io/flowforge/flowforge-frontend"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "dsn: https://sentry\\.io/flowforge/flowforge-backend"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "production_mode: false"

  - it: should render prometheus enabled in backend telemetry
    set:
      forge.telemetry.backend.prometheus.enabled: true
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "prometheus:\\n\\s+enabled: true"

  - it: should not include projectProbes by default
    asserts:
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:"

  - it: should not render projectProbes when set to empty object
    set:
      forge.projectProbes: {}
    asserts:
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:"

  - it: should render livenessProbe when provided
    set:
      forge.projectProbes:
        livenessProbe:
          httpGet:
            path: /healthz
            port: 1880
          initialDelaySeconds: 5
          periodSeconds: 10
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:\\n\\s{2,}livenessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "livenessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "httpGet:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "path: /healthz"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "port: 1880"

  - it: should render readinessProbe only when provided
    set:
      forge.projectProbes:
        readinessProbe:
          httpGet:
            path: /ready
            port: 1880
          initialDelaySeconds: 3
          periodSeconds: 5
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:\\n\\s{2,}readinessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "readinessProbe:"
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "livenessProbe:"
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "startupProbe:"

  - it: should render startupProbe when provided
    set:
      forge.projectProbes:
        startupProbe:
          httpGet:
            path: /startup
            port: 1880
          failureThreshold: 30
          periodSeconds: 5
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:\\n\\s{2,}startupProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "startupProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "path: /startup"

  - it: should render all three probes when all are provided
    set:
      forge.projectProbes:
        livenessProbe:
          httpGet:
            path: /healthz
            port: 1880
        readinessProbe:
          httpGet:
            path: /ready
            port: 1880
        startupProbe:
          httpGet:
            path: /startup
            port: 1880
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:"
      # Ensure all three probes are nested under projectProbes (order independent)
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "projectProbes:\\n\\s{2,}livenessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "(?s)projectProbes:.*\\n\\s{2,}readinessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "(?s)projectProbes:.*\\n\\s{2,}startupProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "livenessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "readinessProbe:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "startupProbe:"
  - it: should not render containerSecurityContext by default
    asserts:
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "containerSecurityContext:"

  - it: should not render podSecurityContext when forge.projectPodSecurityContext is null
    set:
      forge.projectPodSecurityContext: null
    asserts:
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "podSecurityContext:"

  - it: should render podSecurityContext when forge.projectPodSecurityContext is set
    set:
      forge.projectPodSecurityContext:
        runAsUser: 2001
        runAsGroup: 2002
        fsGroup: 2003
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "podSecurityContext:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "runAsUser: 2001"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "runAsGroup: 2002"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "fsGroup: 2003"

  - it: should render containerSecurityContext when forge.projectContainerSecurityContext is set
    set:
      forge.projectContainerSecurityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        readOnlyRootFilesystem: true
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "containerSecurityContext:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "allowPrivilegeEscalation: false"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "runAsNonRoot: true"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "readOnlyRootFilesystem: true"

  - it: should render both podSecurityContext and containerSecurityContext when both are set
    set:
      forge.projectPodSecurityContext:
        runAsUser: 2001
        runAsGroup: 2002
      forge.projectContainerSecurityContext:
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "podSecurityContext:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "runAsUser: 2001"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "runAsGroup: 2002"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "containerSecurityContext:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "runAsNonRoot: true"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "capabilities:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "drop:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "- ALL"

  # Expert feature tests
  - it: should not render expert configuration by default
    asserts:
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "expert:"

  - it: should not render expert configuration when expert is disabled
    set:
      forge.expert:
        enabled: false
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "expert:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "enabled: false"

  - it: should render expert configuration when expert is enabled
    set:
      forge.expert:
        enabled: true
        service:
          url: "https://expert.example.com"
          token: "test-token"
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "expert:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "enabled: true"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "token: <%= ENV\\['EXPERT_TOKEN'\\] %>"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "url: https://expert\\.example\\.com"

  - it: should render expert configuration with custom requestTimeout
    set:
      forge.expert:
        enabled: true
        service:
          url: "https://expert.example.com"
          token: "test-token"
        requestTimeout: 30000
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "expert:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "requestTimeout: 30000"

  - it: should render expert configuration with default requestTimeout
    set:
      forge.expert:
        enabled: true
        service:
          url: "https://expert.example.com"
          token: "test-token"
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "expert:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "requestTimeout: 60000"

  - it: should not render accessModes when forge.persistentStorage.accessMode is not set
    set:
      forge.persistentStorage.enabled: true
    asserts:
      - notMatchRegex:
          path: data["flowforge.yml"]
          pattern: "accessMode:"

  - it: should render accessModes when forge.persistentStorage.accessMode is set
    set:
      forge.persistentStorage.enabled: true
      forge.persistentStorage.accessMode: "ReadWriteMany"
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "storage:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "accessMode: ReadWriteMany"

  - it: should render ai enabled by default
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "ai:"
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "ai:\\n\\s{2,}enabled: true"

  - it: should render ai disabled when forge.ai.enabled is false
    set:
      forge.ai.enabled: false
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "ai:\\n\\s{2,}enabled: false"

  - it: should render ai enabled when forge.ai.enabled is true
    set:
      forge.ai.enabled: true
    asserts:
      - matchRegex:
          path: data["flowforge.yml"]
          pattern: "ai:\\n\\s{2,}enabled: true"
