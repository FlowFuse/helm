  notify-slack:
    name: Notify about release failure
    needs: [build_application_container, build_nodered_container, build_nodered_container_223, build_nodered_container_31, build_nodered_container_40, build_nodered_container_41, build_file_server_container, build_nodered_container_50]
    if: failure()
    runs-on: ubuntu-latest

    steps:
    - name: Notify Slack
      uses: FlowFuse/github-actions-workflows/actions/slack_notification@slack_notification/v1
      with:
        bot-token: ${{ secrets.SLACK_GHBOT_TOKEN }}
        mode: channel
        blocks: |
          [
            { "type": "header", "text": { "type": "plain_text", "text": ":x: ${{ github.workflow }} workflow failed", "emoji": true } },
            { "type": "divider" },
            { "type": "section", "text": { "type": "mrkdwn", "text": "<${{ github.server_url }}/${{ github.repository }}/actions/workflows/build-containers.yml|${{ github.workflow }}> workflow failed to complete successfully." } },
            { "type": "section", "text": { "type": "mrkdwn", "text": "*Workflow run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>" } }
          ]
