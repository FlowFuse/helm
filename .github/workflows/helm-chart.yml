name: Helm chart validation
on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'
      - '.github/workflows/helm-chart.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'helm/**'
      - '.github/workflows/helm-chart.yml'

jobs:
  lint:
    name: Lint and install chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.13.2

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.9

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Add required helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add valkey-io https://valkey.io/valkey-helm/ 

      - name: Lint helm chart
        run: |
          ct lint --config ./.github/configs/chart-testing.yaml

      - name: Create kind cluster
        if: "${{!startsWith(github.event.pull_request.title, 'feat: Release')}}"
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Label cluster nodes
        if: "${{!startsWith(github.event.pull_request.title, 'feat: Release')}}"
        run: |
          for node in $(kubectl get nodes -o name); do
            kubectl label --overwrite $node "role=management"
          done

      - name: Install cert-manager (required by EMQX Operator)
        if: "${{!startsWith(github.event.pull_request.title, 'feat: Release')}}"
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=300s \
            deployment/cert-manager deployment/cert-manager-webhook deployment/cert-manager-cainjector \
            -n cert-manager

      - name: Install EMQX Operator
        if: "${{!startsWith(github.event.pull_request.title, 'feat: Release')}}"
        run: |
          helm repo add emqx https://repos.emqx.io/charts
          helm repo update
          helm install emqx-operator emqx/emqx-operator \
            --namespace emqx-operator-system --create-namespace --wait
          kubectl wait --for=condition=Available --timeout=300s \
            deployment -l app.kubernetes.io/instance=emqx-operator -n emqx-operator-system

      - name: Run chart-testing (install and upgrade)
        if: "${{!startsWith(github.event.pull_request.title, 'feat: Release')}}"
        run: ct install --upgrade --config ./.github/configs/chart-testing.yaml
  
  validate:
    name: Validate chart against kubernetes API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      
      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.13.2
      
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Validate chart
        run: |
          helm template flowfuse ./helm/flowfuse --set forge.domain=example.com | kubectl apply --validate=true -f -

  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      
      - name: Install unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 1.0.3 --verify=false

      - name: Run unit tests
        run: |
          helm unittest ./helm/flowfuse -t JUnit -o junit-results.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: always()
        with:
          check_name: 'Helm chart unit tests'
          report_paths: 'junit-results.xml'
          detailed_summary: true

  scan:
    name: Scan chart
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        tool:
          - checkov
          # temporary disabled due to https://github.com/zegl/kube-score/issues/559
          # - kube-score

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
    
      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.13.2
    
      - name: Scan chart with checkov
        if: matrix.tool == 'checkov'
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: ${{ github.workspace }}/helm
          var_file: ${{ github.workspace }}/helm/flowfuse/ci/default-values.yaml
          skip_path: /flowfuse/charts/
          framework: helm
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true
        env: 
          HELM_NAMESPACE: no-default-namespace

      - name: Template chart
        # temporary disabled due to https://github.com/zegl/kube-score/issues/559
        if: false
        run: |
          helm template flowfuse ./helm/flowfuse --set forge.domain=example.com > ${{ github.workspace }}/templated_chart.yaml
      
      - name: Install kube-score
        # temporary disabled due to https://github.com/zegl/kube-score/issues/559
        if: false
        uses: yokawasa/action-setup-kube-tools@b16d49b2c459d33cf9d4c300a220ef0bcdbc730a #v0.14.0
        with:
          setup-tools: "kube-score"
          kube-score: '1.17.0'
  
      - name: Scan chart with kube-score
        # temporary disabled due to https://github.com/zegl/kube-score/issues/559
        if: false
        continue-on-error: true
        run:
          kube-score score ${{ github.workspace }}/templated_chart.yaml --output-format sarif > results.sarif

      - name: "Upload SARIF file"
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
